{% extends 'base.html' %}

{% block content %}
<div class="editCv-container">
    <h2 class="editCv-titulo">Editar Convocatoria</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="editCv-alerta">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="editCv-formulario">
        {% csrf_token %}
        
        <div class="editCv-formulario-campos">
            {{ form.as_p }}
        </div>

        <button type="submit" class="editCv-boton-guardar">Guardar Cambios</button>
        <a href="{% url 'contratacion:lista_convocatorias' %}" class="editCv-boton-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
